<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Slette William; But Revamped</title>
<link rel="icon" type="image/x-icon" href="./lw.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');
:root {
  --accent:#ff3c3c; --accent2:#ff9f00; --blue:#4ab4ff;
  --bg:#0a0a0a; --ui:#0f0f0f; --border:#252525; --text:#e8e8e8;
  --sh: 44px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace}
#topbar{
  position:fixed;top:0;left:0;width:100%;height:var(--sh);
  background:var(--ui);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:4px;padding:0 10px;z-index:100;
}
.tab-btn{
  padding:5px 14px;font-family:'Space Mono',monospace;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;
  background:transparent;color:#888;border:1px solid transparent;
  cursor:pointer;transition:all .15s;
}
.tab-btn:hover{color:#ccc;border-color:#333}
.tab-btn.active{color:var(--accent2);border-color:var(--accent2);background:rgba(255,159,0,.07)}
.tab-btn.locked{color:#444;border-color:transparent;cursor:default}
.tab-btn.locked:hover{color:#555;border-color:#222}
#pause-hint{
  font-size:9px;letter-spacing:1.5px;color:#444;text-transform:uppercase;
  font-family:'Space Mono',monospace;transition:opacity .3s;white-space:nowrap;margin-left:2px;
}
#pause-hint.visible{color:#555}
#topbar-score{margin-left:auto;font-size:13px;color:var(--accent2);letter-spacing:2px;font-family:'Bebas Neue',cursive;}
.panel{
  position:fixed;top:var(--sh);left:0;width:100%;
  background:var(--ui);border-bottom:1px solid var(--border);
  padding:10px 14px;display:none;flex-wrap:wrap;gap:8px 18px;align-items:flex-end;z-index:99;
}
.panel.open{display:flex}
.panel label{display:flex;flex-direction:column;font-size:10px;color:#888;gap:3px;min-width:110px}
.panel label span{color:var(--accent2);font-size:10px}
input[type=range]{width:100px;accent-color:var(--accent);cursor:pointer}
input[type=checkbox]{accent-color:var(--accent2);width:13px;height:13px;cursor:pointer}
.cb-row{flex-direction:row;align-items:center;gap:6px;min-width:auto}
.panel-btn{
  padding:5px 11px;font-family:'Space Mono',monospace;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;background:#181818;color:var(--text);
  border:1px solid #3a3a3a;cursor:pointer;transition:all .15s;align-self:flex-end;
}
.panel-btn:hover{border-color:var(--accent);color:var(--accent)}
.panel-btn.red{border-color:var(--accent);color:var(--accent)}
.panel-btn.red:hover{background:var(--accent);color:#fff}
.section-label{font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;
  width:100%;padding-top:4px;border-top:1px solid #1e1e1e;margin-top:2px}
#gameCanvas{display:block;position:fixed;left:0;top:var(--sh);width:100%;transition:filter .15s;}
#gameCanvas.paused{filter:blur(4px);}
#pauseCard{
  display:none;position:fixed;top:var(--sh);left:0;width:100%;bottom:0;
  z-index:150;pointer-events:none;align-items:center;justify-content:center;
}
#pauseCard.visible{display:flex;}
#pauseCard-inner{
  pointer-events:auto;text-align:center;padding:26px 40px 22px;
  background:rgba(10,10,10,0.82);border:1px solid rgba(255,159,0,0.3);
  box-shadow:0 0 60px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,159,0,0.03);min-width:240px;
}
#pauseCard-inner h2{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:8px;color:var(--accent2);margin-bottom:4px;}
#pauseCard-inner .pc-hint{font-size:9px;letter-spacing:2px;color:#555;margin-bottom:18px;font-family:'Space Mono',monospace;text-transform:uppercase;}
#pauseCard-inner .pc-btns{display:flex;gap:8px;justify-content:center;}
#pauseCard-inner button{padding:8px 18px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;background:#0d0d0d;color:#fff;border:1px solid #444;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
#pauseCard-inner button:hover{background:var(--accent);border-color:var(--accent)}
#deathScreen{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:9000;background:#000;justify-content:center;align-items:center;flex-direction:column;
  font-family:'Bebas Neue',cursive;overflow:hidden;
}
#deathScreen canvas#deathBg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#deathScreen .ds-content{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center}
.ds-title{font-size:clamp(72px,18vw,220px);letter-spacing:10px;color:#ff2020;line-height:.9;animation:dtPulse .7s ease-in-out infinite alternate;}
@keyframes dtPulse{from{text-shadow:0 0 40px rgba(255,30,30,.7),0 0 100px rgba(255,30,30,.3)}to{text-shadow:0 0 100px rgba(255,30,30,1),0 0 250px rgba(255,30,30,.7)}}
.ds-score{font-size:38px;letter-spacing:5px;color:#fff;margin:8px 0 2px}
.ds-hs{font-size:22px;letter-spacing:3px;color:var(--accent2);margin-bottom:6px}
.ds-new{font-size:16px;letter-spacing:2px;color:#4f4;animation:blink .5s step-end infinite;margin-bottom:14px}
@keyframes blink{50%{opacity:0}}
.ds-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.ds-btns button{padding:11px 22px;font-family:'Space Mono',monospace;font-size:13px;cursor:pointer;background:#0d0d0d;color:#fff;border:1.5px solid #444;letter-spacing:2px;text-transform:uppercase;transition:all .15s;}
.ds-btns button:hover{background:var(--accent);border-color:var(--accent)}
.ds-btns button.pb-btn{border-color:var(--blue);color:var(--blue)}
.ds-btns button.pb-btn:hover{background:var(--blue);color:#000}
#playbackOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9500;background:rgba(2,4,14,.96);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.pb-head{font-family:'Bebas Neue',cursive;font-size:34px;letter-spacing:8px;color:var(--blue)}
#playbackCanvas{position:static;border:1px solid #1e2a3a;box-shadow:0 0 50px rgba(0,100,200,.3);max-width:88vw;max-height:58vh;display:block}
.pb-timeline{width:min(720px,88vw);height:8px;background:#1a1a1a;border-radius:4px;cursor:pointer;position:relative;overflow:hidden}
.pb-timeline-fill{height:100%;background:linear-gradient(90deg,#1a6fff,#4af);border-radius:4px;pointer-events:none}
#pbTimestamp{font-size:11px;color:#555;letter-spacing:1px}
.pb-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.pb-controls button{padding:7px 16px;font-family:'Space Mono',monospace;font-size:11px;background:#0e0e0e;color:#aaa;border:1px solid #2a2a2a;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.pb-controls button:hover{background:var(--blue);border-color:var(--blue);color:#000}
.spd-row{font-size:11px;color:#666;display:flex;align-items:center;gap:8px}
.spd-row input{width:70px;accent-color:var(--blue)}
#puToast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(10,20,10,.9);border:1px solid #3a8a3a;padding:8px 22px;font-size:13px;color:#5f5;letter-spacing:1px;font-family:'Space Mono',monospace;z-index:500;pointer-events:none;opacity:0;transition:opacity .3s;border-radius:2px;}
#puToast.show{opacity:1}
#warningFlash{
  position:fixed;top:var(--sh);left:0;width:100%;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;
  background:rgba(255,80,0,.12);border-bottom:1px solid rgba(255,80,0,.25);color:#ff7a30;
}
#warningFlash.show{opacity:1}

/* ─── MOBILE ON-SCREEN CONTROLS ─── */
#mobileControls{
  display:none;
  position:fixed;bottom:0;left:0;width:100%;height:80px;
  z-index:400;pointer-events:none;
}
#mobileJump{
  pointer-events:auto;
  position:absolute;right:16px;bottom:12px;
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,159,0,.18);border:2px solid rgba(255,159,0,.5);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;color:var(--accent2);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:background .1s,transform .1s;
  box-shadow:0 0 20px rgba(255,159,0,.15);
}
#mobileJump:active{background:rgba(255,159,0,.38);transform:scale(0.93);}
#mobilePause{
  pointer-events:auto;
  position:absolute;left:16px;bottom:12px;
  width:64px;height:64px;border-radius:50%;
  background:rgba(20,20,20,.7);border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#888;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:background .1s,transform .1s;
}
#mobilePause:active{background:rgba(80,80,80,.5);transform:scale(0.93);}

/* ─── RESPONSIVE TOPBAR ─── */
@media(max-width:540px){
  :root{--sh:40px;}
  .tab-btn{padding:4px 9px;font-size:9px;letter-spacing:1px;}
  #pause-hint{display:none;}
  #topbar-score{font-size:12px;letter-spacing:1px;}
  #topbar{gap:2px;padding:0 6px;}
}
@media(max-width:360px){
  .tab-btn{padding:3px 7px;font-size:8px;}
}

/* ─── RESPONSIVE PANELS ─── */
@media(max-width:600px){
  .panel{
    max-height:55vh;overflow-y:auto;
    padding:8px 10px;gap:10px 10px;
    -webkit-overflow-scrolling:touch;
  }
  .panel label{min-width:calc(50% - 10px);}
  input[type=range]{width:100%;max-width:160px;}
  .section-label{font-size:8px;}
  .panel-btn{padding:7px 12px;font-size:10px;}
}
@media(max-width:400px){
  .panel label{min-width:100%;}
}

/* ─── PAUSE CARD MOBILE ─── */
@media(max-width:540px){
  #pauseCard-inner{padding:20px 22px 16px;min-width:0;width:82vw;}
  #pauseCard-inner h2{font-size:36px;letter-spacing:5px;}
  #pauseCard-inner button{padding:10px 14px;font-size:10px;}
  .pc-hint{display:none;}
}

/* ─── DEATH SCREEN MOBILE ─── */
@media(max-width:540px){
  .ds-title{font-size:clamp(56px,18vw,140px);letter-spacing:4px;}
  .ds-score{font-size:28px;letter-spacing:3px;}
  .ds-hs{font-size:16px;}
  .ds-new{font-size:13px;}
  .ds-btns button{padding:12px 18px;font-size:12px;letter-spacing:1px;}
}

/* ─── PLAYBACK OVERLAY MOBILE ─── */
@media(max-width:600px){
  #playbackOverlay{gap:8px;padding:0 6px;}
  .pb-head{font-size:24px;letter-spacing:4px;}
  #playbackCanvas{max-height:42vh;}
  .pb-controls button{padding:9px 12px;font-size:10px;}
  .spd-row input{width:55px;}
}

/* ─── TOAST MOBILE ─── */
@media(max-width:540px){
  #puToast{bottom:96px;font-size:11px;padding:6px 14px;}
}

/* ─── SHOW MOBILE CONTROLS ON TOUCH DEVICES ─── */
@media(hover:none) and (pointer:coarse){
  #mobileControls{display:block;}
}
</style>
</head>
<body>

<div id="topbar">
  <button class="tab-btn locked" id="tabGameplay">Gameplay</button>
  <button class="tab-btn locked" id="tabAudio">Audio</button>
  <button class="tab-btn locked" id="tabGhost">Ghost</button>
  <span id="pause-hint">[ Running : Press P/ESC to pause ]</span>
  <span id="topbar-score">SCORE: 0</span>
</div>

<div class="panel" id="panelGameplay">
  <div class="section-label">Physics & Obstacles</div>
  <label>Spawn Freq (ms)<input type="range" min="400" max="2000" id="spawnFreq"><span id="spawnFreqVal"></span></label>
  <label>Speed<input type="range" min="2" max="20" id="dinoSpeed"><span id="dinoSpeedVal"></span></label>
  <label>Jump Power<input type="range" min="6" max="20" id="jumpPower"><span id="jumpPowerVal"></span></label>
  <label>Gravity<input type="range" min="0.2" max="5" step="0.1" id="gravity"><span id="gravityVal"></span></label>
  <label>Score Rate<input type="range" min="0" max="10" step="0.05" id="scoreRate"><span id="scoreRateVal"></span></label>
  <label>Hard Jump %<input type="range" min="0" max="100" id="hardJump"><span id="hardJumpVal"></span></label>
  <label>Hitbox Height<input type="range" min="0" max="100" id="hitHeight"><span id="hitHeightVal"></span></label>
  <button class="panel-btn red" id="resetSettings">Reset All</button>
</div>

<div class="panel" id="panelAudio">
  <label>Music<input type="range" min="0" max="1" step="0.01" id="musicVol"><span id="musicVolVal"></span></label>
  <label>SFX<input type="range" min="0" max="1" step="0.01" id="sfxVol"><span id="sfxVolVal"></span></label>
  <label>Death SFX<input type="range" min="0" max="1" step="0.01" id="deathVol"><span id="deathVolVal"></span></label>
</div>

<div class="panel" id="panelGhost">
  <label class="cb-row"><input type="checkbox" id="ghostEnabled">Show Ghost</label>
  <label class="cb-row"><input type="checkbox" id="ghostPrediction" checked>Path Ribbon</label>
  <label>Ghost Opacity<input type="range" min="0.05" max="0.7" step="0.01" id="ghostOpacity"><span id="ghostOpacityVal"></span></label>
  <label class="cb-row"><input type="checkbox" id="ghostTimer" checked>Death Timer</label>
  <button class="panel-btn" id="clearGhost" style="border-color:#4af;color:#4af">Clear Ghost</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="pauseCard">
  <div id="pauseCard-inner">
    <h2>PAUSED</h2>
    <div class="pc-hint">Edit settings above &uarr;</div>
    <div class="pc-btns">
      <button onclick="resumeGame()">Resume</button>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>
</div>

<div id="deathScreen">
  <canvas id="deathBg"></canvas>
  <div class="ds-content">
    <div class="ds-title">SLETTED</div>
    <div class="ds-score">SCORE: <span id="dsScore">0</span></div>
    <div class="ds-hs" id="dsHs">HIGH SCORE: 0</div>
    <div class="ds-new" id="dsNew" style="display:none">NEW HIGH SCORE!</div>
    <div class="ds-btns">
      <button onclick="doRestart()">Restart</button>
      <button class="pb-btn" onclick="openPlayback()">Playback</button>
    </div>
  </div>
</div>

<div id="playbackOverlay">
  <div class="pb-head">PLAYBACK</div>
  <canvas id="playbackCanvas"></canvas>
  <div class="pb-timeline" id="pbTimeline"><div class="pb-timeline-fill" id="pbFill" style="width:0%"></div></div>
  <div id="pbTimestamp">00:00.000</div>
  <div class="pb-controls">
    <button id="pbPlayPause">Pause</button>
    <button id="pbRestart">Restart</button>
    <button onclick="closePlayback()">Close</button>
    <div class="spd-row">Speed <input type="range" id="pbSpeed" min="0.1" max="4" step="0.1" value="1"> <span id="pbSpeedVal">1.0x</span></div>
  </div>
</div>

<div id="puToast"></div>
<div id="warningFlash">&#9888; INCOMING DROP</div>

<div id="mobileControls">
  <div id="mobilePause">⏸</div>
  <div id="mobileJump">JUMP</div>
</div>

<script>
console.log(`
-------
Slette William; Revamped (Alpha)
Console
-------
Expect changes, bugs and unfairness (rarely).
The changes will balance the systems and the randomness that there is to offer.
Thanks!
[WAI] Loading Slette William,
      If errors appear, please report it in the issues tab in github.
`)

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const SH     = 44;

function getPanelH(){const open=document.querySelector('.panel.open');return open?open.offsetHeight:0;}
function resizeCanvas(){
  const ph=getPanelH();
  canvas.style.top=(SH+ph)+'px';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight-SH-ph;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const dinoImg=new Image(); dinoImg.src='./lw.png';
const cacImg =new Image(); cacImg.src ='./cac.png';
const jetImg =new Image(); jetImg.src ='./fw.png';
let toLoad=3;
[dinoImg,cacImg,jetImg].forEach(img=>{img.onload=img.onerror=()=>{if(--toLoad===0)startGame();};});

console.log("[WAI] Images loaded")

const passSound      = new Audio('./sound.mp3');
const playbackTheme  = new Audio('./playbacktheme.mp3');
const pauseTheme     = new Audio('./pausetheme.mp3');
const slettedTheme   = new Audio('./slettedtheme.mp3');
const milestoneSound = new Audio('./over.mp3');
const sleSound       = new Audio('./sle.mp3');
const ttedSound      = new Audio('./tted.mp3');
const bg1=new Audio('./back.mp3');
const bg2=new Audio('./back2.mp3');
const bg3=new Audio('./end.mp3');
const bgTracks=[bg1,bg2];

function applyVols(){
  const mv=+S.musicVol.value, sv=+S.sfxVol.value, dv=+S.deathVol.value;
  bgTracks.forEach(t=>t.volume=mv);
  bg3.volume=mv;
  pauseTheme.volume=mv;
  playbackTheme.volume=mv;
  passSound.volume=sv;
  milestoneSound.volume=sv;
  sleSound.volume=dv;
  ttedSound.volume=dv;
  slettedTheme.volume=dv;
}

console.log("[WAI] Sound effects and themes loaded! (.mp3)")

const RANGE_IDS=['spawnFreq','dinoSpeed','jumpPower','gravity','scoreRate','hardJump','hitHeight','musicVol','sfxVol','deathVol','ghostOpacity'];
const CB_IDS=['ghostEnabled','ghostPrediction','ghostTimer'];
const DEFS={spawnFreq:1000,dinoSpeed:6,jumpPower:12,gravity:.6,scoreRate:.2,hardJump:12.5,hitHeight:20,musicVol:.4,sfxVol:.7,deathVol:.8,ghostOpacity:.35};
const CB_DEFS={ghostEnabled:false,ghostPrediction:true,ghostTimer:true};
const S={},SV={};
function LS(k,v){if(v!==undefined)localStorage.setItem(k,String(v));else return localStorage.getItem(k);}

RANGE_IDS.forEach(k=>{
  S[k]=document.getElementById(k);
  SV[k]=document.getElementById(k+'Val');
  const stored=LS(k);
  S[k].value=stored!==null?stored:String(DEFS[k]);
  const dec=S[k].step&&parseFloat(S[k].step)<1?2:1;
  if(SV[k])SV[k].textContent=parseFloat(S[k].value).toFixed(dec);
  S[k].addEventListener('input',()=>{
    const dec2=S[k].step&&parseFloat(S[k].step)<1?2:1;
    if(SV[k])SV[k].textContent=parseFloat(S[k].value).toFixed(dec2);
    LS(k,S[k].value);
    if(k==='hitHeight'&&dino)dino.hitHeight=+S[k].value;
    if(['musicVol','sfxVol','deathVol'].includes(k))applyVols();
  });
});
CB_IDS.forEach(k=>{
  const el=document.getElementById(k);
  const stored=LS(k);
  el.checked=stored!==null?(stored==='true'):CB_DEFS[k];
  el.addEventListener('change',()=>LS(k,el.checked));
});
document.getElementById('resetSettings').addEventListener('click',()=>{
  if(!confirm('Reset all settings to defaults?'))return;
  [...RANGE_IDS,...CB_IDS].forEach(k=>localStorage.removeItem(k));
  location.reload();
});
document.getElementById('clearGhost').addEventListener('click',()=>{
  localStorage.removeItem('bestRunData');
  bestRunFrames=[]; alert('Ghost cleared!');
});
function gS(k){return parseFloat(S[k].value);}

const TABS=[
  {btn:'tabGameplay',panel:'panelGameplay'},
  {btn:'tabAudio',   panel:'panelAudio'},
  {btn:'tabGhost',   panel:'panelGhost'},
];
function updateTabLockState(){
  const canEdit=paused||gameOver;
  const hint=document.getElementById('pause-hint');
  TABS.forEach(({btn})=>{
    const el=document.getElementById(btn);
    if(canEdit)el.classList.remove('locked');
    else el.classList.add('locked');
  });
  if(canEdit){
    hint.textContent=paused?'[ Paused : Press P/ESC or click Resume to continue ]':'';
    hint.classList.toggle('visible',paused);
  } else {
    hint.textContent='[ Running : Press P/ESC to pause ]';
    hint.classList.remove('visible');
  }
}
TABS.forEach(({btn,panel})=>{
  document.getElementById(btn).addEventListener('click',()=>{
    if(!paused&&!gameOver&&slettedPhase===0){
      togglePause();
      const panelEl=document.getElementById(panel);
      TABS.forEach(t=>{document.getElementById(t.panel).classList.remove('open');document.getElementById(t.btn).classList.remove('active');});
      panelEl.classList.add('open'); document.getElementById(btn).classList.add('active');
      setTimeout(resizeCanvas,10); return;
    }
    if(!paused&&!gameOver)return;
    const panelEl=document.getElementById(panel);
    const isOpen=panelEl.classList.contains('open');
    TABS.forEach(t=>{document.getElementById(t.panel).classList.remove('open');document.getElementById(t.btn).classList.remove('active');});
    if(!isOpen){panelEl.classList.add('open');document.getElementById(btn).classList.add('active');}
    setTimeout(resizeCanvas,10);
  });
});

const ground=()=>canvas.height-80;
let dino,cactuses,jets,fallingCactuses,jetParticles,impactParticles;
let score,highScore,normalHighScore,moddedHighScore;
let gameOver,paused,jetsUnlocked,lastMilestone;
let cactusTimer,musicPlaying=false,activeTrack=null;
let frameCount=0;
let slettedPhase=0,slettedX=0,slettedY=0,slettedVX=0,slettedVY=0;
let slettedAngle=0,slettedTrail=[];
let screenShakeF=0,screenShakeA=0;
let activeBuffs={};
let forceFieldActive=false;
let ttedSoundPlayed=false;
let capsules=[];
let tabHiddenAt=null;
let warnFlashTimer=null;
let jetSpawnScheduled=false;

// ══════════════════════════════════════════════════════════════
//  JET LIFE SYSTEM
//  - playerHP: 2 max. Only reduced by falling jet cactuses.
//  - Ground cactuses still instant-kill (unchanged).
//  - hpBarOpacity: 0=hidden, 1=visible. Fades in on hit, fades out after full regen.
//  - hpRegenTimer: counts down 300 frames (5s) before restoring 1 HP.
//  - hpHitFlash: brief white flash on each pip when hit.
// ══════════════════════════════════════════════════════════════
const HP_MAX = 2;
const HP_REGEN_FRAMES = 300; // 5 seconds at 60fps
const HP_BAR_FADE_FRAMES = 120; // 2 seconds fade after full regen

let playerHP, hpBarOpacity, hpBarFadeTimer, hpRegenTimer, hpHitFlash, hpInvincFrames;

function initHP(){
  playerHP = HP_MAX;
  hpBarOpacity = 0;
  hpBarFadeTimer = 0;
  hpRegenTimer = 0;
  hpHitFlash = [0, 0]; // flash timer per pip
  hpInvincFrames = 0;  // brief invincibility after hit (prevents double-hit)
}

function takeFallingCactusHit(){
  // Invincibility window — prevents eating two hits in the same frame
  if(hpInvincFrames > 0) return false;
  if(forceFieldActive) return false; // forcefield handles it externally

  playerHP -= 1;
  hpBarOpacity = 1;        // snap visible
  hpBarFadeTimer = 0;      // cancel any fade-out
  hpRegenTimer = HP_REGEN_FRAMES; // restart regen countdown
  hpInvincFrames = 60;     // 1 second invincibility
  // Flash the pip that was just lost
  hpHitFlash[playerHP] = 20; // playerHP is now the index of the lost pip
  screenShakeF = Math.max(screenShakeF, 12);
  screenShakeA = Math.max(screenShakeA, 8);

  // Spawn hit particles on dino
  for(let j=0;j<16;j++){
    impactParticles.push({
      x:dino.x+dino.width/2+(Math.random()-.5)*30,
      y:dino.y+dino.height/2+(Math.random()-.5)*30,
      dx:(Math.random()-.5)*7,dy:(Math.random()-.5)*7-2,
      size:Math.random()*4+2,life:35,color:'#ff4444'
    });
  }

  if(playerHP <= 0){
    handleGameOver();
    return true; // died
  }
  showToast('⚠ HIT! '+playerHP+' HP REMAINING','#ff4444');
  return false; // survived
}

function tickHP(){
  if(hpInvincFrames > 0) hpInvincFrames--;

  if(playerHP < HP_MAX){
    if(hpRegenTimer > 0){
      hpRegenTimer--;
    } else {
      // Regen one HP
      playerHP++;
      hpHitFlash[playerHP-1] = 30; // flash the restored pip green
      if(playerHP < HP_MAX){
        hpRegenTimer = HP_REGEN_FRAMES; // keep ticking for next pip
      } else {
        // Full HP — start fade-out countdown
        hpBarFadeTimer = HP_BAR_FADE_FRAMES;
        showToast('♥ HP RESTORED','#44ff88');
      }
    }
  }

  // Fade out bar
  if(hpBarFadeTimer > 0){
    hpBarFadeTimer--;
    hpBarOpacity = hpBarFadeTimer / HP_BAR_FADE_FRAMES;
    if(hpBarFadeTimer === 0) hpBarOpacity = 0;
  }

  // Tick hit flashes
  for(let i=0;i<HP_MAX;i++){
    if(hpHitFlash[i]>0) hpHitFlash[i]--;
  }
}

function drawHPBar(){
  if(hpBarOpacity <= 0.01) return;

  const pipW = 34, pipH = 14, gap = 6;
  const totalW = HP_MAX * pipW + (HP_MAX - 1) * gap;
  const bx = 14, by = 14;

  ctx.save();
  ctx.globalAlpha = hpBarOpacity;

  // Background label
  ctx.font = 'bold 9px "Space Mono",monospace';
  ctx.fillStyle = '#aaa';
  ctx.letterSpacing = '2px';
  ctx.fillText('Physical Health', bx, by - 2);

  for(let i=0; i<HP_MAX; i++){
    const px = bx + i*(pipW+gap);
    const py = by + 2;
    const filled = i < playerHP;
    const flash = hpHitFlash[i] > 0;
    const flashPct = hpHitFlash[i] / 30;

    // Outer glow for filled pips
    if(filled){
      ctx.shadowColor = flash ? '#44ff88' : '#ff3333';
      ctx.shadowBlur = 8 + (flash ? flashPct*12 : 0);
    } else {
      ctx.shadowBlur = 0;
    }

    // Pip background
    ctx.fillStyle = filled
      ? (flash ? `rgba(${Math.round(68+flashPct*100)},${Math.round(255)},${Math.round(100+flashPct*100)},0.9)` : 'rgba(220,40,40,0.85)')
      : 'rgba(40,10,10,0.7)';

    // Rounded rect pip
    ctx.beginPath();
    ctx.roundRect(px, py, pipW, pipH, 4);
    ctx.fill();

    // Border
    ctx.strokeStyle = filled
      ? (flash ? '#88ffaa' : '#ff6666')
      : '#441111';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
    ctx.stroke();

    // Pip shine
    if(filled){
      const shine = ctx.createLinearGradient(px, py, px, py+pipH);
      shine.addColorStop(0,'rgba(255,255,255,0.25)');
      shine.addColorStop(0.5,'rgba(255,255,255,0.05)');
      shine.addColorStop(1,'rgba(0,0,0,0.1)');
      ctx.fillStyle = shine;
      ctx.beginPath();
      ctx.roundRect(px, py, pipW, pipH, 4);
      ctx.fill();
    }

    // Heart icon inside pip
    ctx.shadowBlur = 0;
    ctx.font = filled ? '10px serif' : '10px serif';
    ctx.fillStyle = filled ? '#fff' : '#441111';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♥', px + pipW/2, py + pipH/2);
  }

  // Regen progress bar (shown when damaged and waiting to regen)
  if(playerHP < HP_MAX && hpRegenTimer > 0){
    const regenBarW = totalW;
    const regenBarH = 3;
    const regenY = by + pipH + 6;
    const pct = 1 - (hpRegenTimer / HP_REGEN_FRAMES);

    ctx.fillStyle = 'rgba(20,20,20,0.7)';
    ctx.beginPath();
    ctx.roundRect(bx, regenY, regenBarW, regenBarH, 2);
    ctx.fill();

    // Animated gradient fill
    const grad = ctx.createLinearGradient(bx, regenY, bx+regenBarW*pct, regenY);
    grad.addColorStop(0,'rgba(80,200,120,0.9)');
    grad.addColorStop(1,'rgba(40,255,100,0.6)');
    ctx.fillStyle = grad;
    ctx.shadowColor='#44ff88';
    ctx.shadowBlur=4;
    ctx.beginPath();
    ctx.roundRect(bx, regenY, regenBarW*pct, regenBarH, 2);
    ctx.fill();

    ctx.shadowBlur=0;
    ctx.font='8px "Space Mono",monospace';
    ctx.fillStyle='rgba(100,220,140,0.7)';
    ctx.textAlign='left';
    ctx.textBaseline='top';
    ctx.fillText('REGEN '+(Math.ceil(hpRegenTimer/60))+'s', bx, regenY+5);
  }

  ctx.restore();
}

  if(document.hidden&&!gameOver&&!paused){

    bgTracks.forEach(t=>{try{t.pause();}catch(e){}});musicPlaying=false;

let recording=[];

  if(gameOver&&slettedPhase>0)return;
  recording.push({dx:dino.x,dy:dino.y,ddy:dino.dy,cactuses:cactuses.map(c=>({...c})),fallingCactuses:fallingCactuses.map(c=>({...c})),score,t:performance.now()});
  if(recording.length>21600)recording.shift();
}

try{const s=localStorage.getItem('bestRunData');if(s)bestRunFrames=JSON.parse(s);}catch(e){}

    bestRunFrames=recording.slice();
    try{localStorage.setItem('bestRunData',JSON.stringify(bestRunFrames));}catch(e){}

const POWERUP_TYPES=[
  {id:'lowGrav',name:'LOW GRAVITY',color:'#88aaff',icon:'◈',duration:600,apply:()=>{activeBuffs.gravity={base:gS('gravity'),mult:.35};},remove:()=>{delete activeBuffs.gravity;}},
  {id:'slowSpawn',name:'SLOW CACTUS',color:'aaff88',icon:'◇',duration:500,apply:()=>{activeBuffs.spawnMult=.45;},remove:()=>{delete activeBuffs.spawnMult;}},
  {id:'noHardJump',name:'NO HARD JUMPS',color:'#ffaa88',icon:'◆',duration:700,apply:()=>{activeBuffs.noHard=true;},remove:()=>{delete activeBuffs.noHard;}},
  {id:'smallHit',name:'TINY HITBOX',color:'#ff88ff',icon:'◉',duration:550,apply:()=>{activeBuffs.hitMult=.3;},remove:()=>{delete activeBuffs.hitMult;}},
  {id:'forcefield',name:'FORCEFIELD',color:'#ffff00',icon:'★',duration:400,apply:()=>{forceFieldActive=true;activeBuffs.forcefield=true;},remove:()=>{forceFieldActive=false;delete activeBuffs.forcefield;}},
];
let activePowerups={};

function getEffGravity(){return activeBuffs.gravity?activeBuffs.gravity.base*activeBuffs.gravity.mult:gS('gravity');}
function getEffHitH(){return activeBuffs.hitMult?dino.hitHeight*activeBuffs.hitMult:dino.hitHeight;}
function noHard(){return !!activeBuffs.noHard;}
function spawnMult(){return activeBuffs.spawnMult||1;}

function applyPowerup(type){
  if(activePowerups[type.id]){activePowerups[type.id].framesLeft=type.duration;return;}
  activePowerups[type.id]={framesLeft:type.duration,type};
  type.apply();
  showToast(type.icon+' '+type.name+' ACTIVATED',type.color);
}
function tickPowerups(){
  for(const id in activePowerups){
    const p=activePowerups[id];p.framesLeft--;
    if(p.framesLeft<=0){p.type.remove();delete activePowerups[id];}
  }
}
function showToast(msg,color='#5f5'){
  const t=document.getElementById('puToast');
  t.textContent=msg;t.style.color=color;t.style.borderColor=color;
  t.classList.add('show');clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2200);
}

function spawnCapsule(x,y,parentJet){
  const type=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  capsules.push({x,y,vy:0,type,angle:0,collected:false,parentJet:parentJet||null,landed:false});
}
function drawCapsule(c){
  ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle);
  const grd=ctx.createRadialGradient(0,0,4,0,0,18);
  grd.addColorStop(0,c.type.color+'cc');grd.addColorStop(1,c.type.color+'00');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c.type.color+'44';ctx.strokeStyle=c.type.color;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-10,-16,20,32,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(c.type.icon,0,0);ctx.restore();
}
function updateCapsules(){
  const gY=ground()+60;
  for(let i=capsules.length-1;i>=0;i--){
    const c=capsules[i];
    if(c.parentJet&&!c.parentJet.fullyLanded){
      c.x=c.parentJet.x+c.parentJet.width/2;
      c.y=c.parentJet.y+c.parentJet.height;
      c.angle+=.03;
      drawCapsule(c);
      continue;
    }
    if(!c.landed){
      c.vy+=.3;c.y+=c.vy;c.angle+=.04;
      if(c.y>gY){c.y=gY;c.vy*=-.45;if(Math.abs(c.vy)<1)c.landed=true;}
    } else {
      c.angle+=.01;
    }
    drawCapsule(c);
    if(!c.collected&&dino.x<c.x+16&&dino.x+dino.width>c.x-16&&dino.y<c.y+16&&dino.y+dino.height>c.y-16){
      c.collected=true;applyPowerup(c.type);
      for(let j=0;j<14;j++)impactParticles.push({x:c.x,y:c.y,dx:(Math.random()-.5)*6,dy:(Math.random()-.5)*6-2,size:Math.random()*4+2,life:35,color:c.type.color});
      capsules.splice(i,1);
    } else if(c.y>canvas.height+100){capsules.splice(i,1);}
  }
}
function drawForcefield(){
  if(!forceFieldActive)return;
  const cx=dino.x+dino.width/2,cy=dino.y+dino.height/2;
  const r=50+Math.sin(frameCount*.15)*5;
  ctx.save();ctx.strokeStyle='rgba(255,220,0,.8)';ctx.lineWidth=2.5;
  ctx.shadowColor='#ff0';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.restore();
  ctx.save();ctx.translate(cx,cy);ctx.rotate(frameCount*.04);
  ctx.strokeStyle='rgba(255,255,100,.5)';ctx.lineWidth=1.5;ctx.setLineDash([8,16]);
  ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*2);ctx.stroke();ctx.restore();
}
function drawBuffBar(){
  const ids=Object.keys(activePowerups);if(!ids.length)return;
  let bx=10;
  ids.forEach(id=>{
    const p=activePowerups[id],t=p.type,pct=p.framesLeft/t.duration,w=80,h=18;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx,canvas.height-35,w,h);
    ctx.fillStyle=t.color+'55';ctx.fillRect(bx,canvas.height-35,w*pct,h);
    ctx.strokeStyle=t.color+'99';ctx.lineWidth=1;ctx.strokeRect(bx,canvas.height-35,w,h);
    ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.icon+' '+t.name.substring(0,8),bx+w/2,canvas.height-26);
    ctx.restore();bx+=w+6;
  });
}

function initState(){
  dino={x:50,y:-10,width:60,height:70,hitHeight:gS('hitHeight'),dy:0,isJumping:false};
  cactuses=[];jets=[];fallingCactuses=[];capsules=[];
  jetParticles=[];impactParticles=[];
  activePowerups={};activeBuffs={};forceFieldActive=false;
  score=0;frameCount=0;recording=[];
  highScore=+(LS('highScore')||0);normalHighScore=+(LS('normalHighScore')||0);moddedHighScore=+(LS('moddedHighScore')||0);
  gameOver=false;paused=false;jetsUnlocked=false;lastMilestone=0;
  slettedPhase=0;slettedTrail=[];screenShakeF=0;
  ttedSoundPlayed=false;tabHiddenAt=null;
  jetSpawnScheduled=false;
  initHP(); // initialise life system
  updateTabLockState();
}
function isDefault(){
  for(const k in DEFS){const cur=LS(k);if((cur===null?String(DEFS[k]):cur)!==String(DEFS[k]))return false;}
  return true;
}

function spawnCactus(){
  if(paused||gameOver||document.hidden)return;
  const w=Math.floor(Math.random()*20)+20,h=Math.floor(Math.random()*40)+40,gap=Math.floor(Math.random()*200)+400;
  const hardChance=noHard()?0:gS('hardJump');
  if(Math.random()*100<hardChance){
    const f={x:canvas.width+gap,y:ground()+(60-h),width:w,height:h};
    const s={x:f.x+f.width+Math.floor(Math.random()*10)+10,y:f.y,width:w,height:h};
    cactuses.push(f,s);
  } else {
    cactuses.push({x:canvas.width+gap,y:ground()+(60-h),width:w,height:h});
  }
  const d=Math.max(200,Math.random()*700+gS('spawnFreq')*spawnMult());
  cactusTimer=setTimeout(spawnCactus,d);
}

function spawnJet(){
  if(paused||gameOver){
    jetSpawnScheduled=false;
    return;
  }
  const willCrash=Math.random()<0.30;
  const crashAt=willCrash?(canvas.width*(0.30+Math.random()*0.40)):Infinity;

  jets.push({
    x:-120, y:Math.random()*90+20,
    width:100, height:60,
    speed:4+Math.random()*1.5,
    dropCooldown: Math.floor(Math.random()*30),
    framesOnScreen:0,
    willCrash, crashAt,
    crashTriggered:false,
    crashParticles:[],
    smokeParticles:[],
    falling:false,
    vy:0,
    angle:0,
    fullyLanded:false,
    landedFrames:0,
    lootSpawned:false,
    active:true,
  });

  const nextDelay = Math.floor(Math.random()*7000)+7000;
  setTimeout(spawnJet, nextDelay);
}

function triggerWarning(){
  const wf=document.getElementById('warningFlash');
  wf.classList.add('show');clearTimeout(warnFlashTimer);
  warnFlashTimer=setTimeout(()=>wf.classList.remove('show'),1100);
}

function jetDrop(jet){
  if(fallingCactuses.length>=2)return;

  const dropX=jet.x+jet.width/2-10;

  for(const c of cactuses){
    if(Math.abs(c.x-dropX)<80)return;
  }

  const dinoMid=dino.x+dino.width/2;
  if(Math.abs(dropX-dinoMid)<180)return;

  triggerWarning();

  fallingCactuses.push({
    x:dropX, y:jet.y+jet.height,
    width:22, height:44,
    dy:2.5,
    dx:0,
    bounceCount:0,
    age:0,
    dead:false,
    fromJet:true, // tag so we know to use HP system instead of instant kill
  });
}

function updateJets(){
  const gY=ground()+60;

  for(let i=jets.length-1;i>=0;i--){
    const jet=jets[i];

    if(!jet.fullyLanded){
      for(let k=0;k<2;k++){
        jetParticles.push({
          x:jet.x-8,
          y:jet.y+jet.height*0.8+(Math.random()-0.5)*8,
          dx:-(Math.random()*2+1),
          dy:(Math.random()-0.5)*0.8,
          size:Math.random()*4+2,
          life:25,
          color:`hsl(${30+Math.random()*20},90%,60%)`
        });
      }
    }

    if(!jet.crashTriggered){
      jet.x+=jet.speed;
      if(jet.x>-jet.width)jet.framesOnScreen++;

      const shadowX=jet.x+jet.width/2;
      const heightFrac=Math.max(0,1-(jet.y/(gY*0.7)));
      ctx.save();ctx.globalAlpha=0.15*heightFrac;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(shadowX,gY+2,jet.width*0.45*heightFrac,4,0,0,Math.PI*2);
      ctx.fill();ctx.restore();

      if(jet.willCrash && jet.x>=jet.crashAt){
        jet.crashTriggered=true;
        jet.vy=-1;
        screenShakeF=20;screenShakeA=10;
        for(let k=0;k<40;k++){
          jet.crashParticles.push({
            x:jet.x+jet.width/2, y:jet.y+jet.height/2,
            dx:(Math.random()-0.5)*11, dy:(Math.random()-0.5)*11-3,
            size:Math.random()*7+3, life:55+Math.floor(Math.random()*30),
            color:`hsl(${Math.random()*40},100%,${50+Math.random()*30}%)`
          });
        }
      }

      const onScreen = jet.framesOnScreen > 30 && jet.x < canvas.width - 160;
      if(onScreen && !jet.willCrash){
        jet.dropCooldown--;
        if(jet.dropCooldown<=0){
          jetDrop(jet);
          jet.dropCooldown = Math.floor(Math.random()*60)+90;
        }
      }

      ctx.drawImage(jetImg,jet.x,jet.y,jet.width,jet.height);

      if(!jet.willCrash && jet.x>canvas.width+140){jets.splice(i,1);continue;}

    } else if(!jet.fullyLanded){
      jet.vy+=0.45;
      jet.x+=jet.speed*0.4;
      jet.y+=jet.vy;
      jet.angle+=0.06;

      for(let k=0;k<3;k++){
        jet.smokeParticles.push({
          x:jet.x+jet.width/2+(Math.random()-0.5)*20,
          y:jet.y+jet.height/2+(Math.random()-0.5)*10,
          dx:(Math.random()-0.5)*0.8,
          dy:-Math.random()*0.5-0.2,
          size:Math.random()*12+6,
          life:50+Math.random()*20,
          maxLife:70,
        });
      }

      for(let k=jet.crashParticles.length-1;k>=0;k--){
        const p=jet.crashParticles[k];
        p.x+=p.dx;p.y+=p.dy;p.dy+=0.2;p.life--;
        if(p.life<=0){jet.crashParticles.splice(k,1);continue;}
        ctx.save();ctx.globalAlpha=Math.max(0,p.life/85);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size),0,Math.PI*2);ctx.fill();ctx.restore();
      }

      ctx.save();
      ctx.translate(jet.x+jet.width/2,jet.y+jet.height/2);
      ctx.rotate(jet.angle);
      ctx.drawImage(jetImg,-jet.width/2,-jet.height/2,jet.width,jet.height);
      ctx.restore();

      if(jet.y+jet.height>=gY){
        jet.y=gY-jet.height;
        jet.fullyLanded=true;
        jet.angle=0.15;
        screenShakeF=30;screenShakeA=16;
        for(let k=0;k<25;k++){
          impactParticles.push({
            x:jet.x+jet.width/2,y:gY,
            dx:(Math.random()-0.5)*10,dy:-Math.random()*6-1,
            size:Math.random()*5+3,life:45,
            color:`hsl(${Math.random()*40},100%,${55+Math.random()*20}%)`
          });
        }
      }

    } else {
      jet.landedFrames++;

      if(jet.landedFrames<300){
        for(let k=0;k<2;k++){
          jet.smokeParticles.push({
            x:jet.x+jet.width/2+(Math.random()-0.5)*25,
            y:jet.y,
            dx:(Math.random()-0.5)*0.5,
            dy:-Math.random()*0.8-0.3,
            size:Math.random()*14+8,
            life:80+Math.random()*40,
            maxLife:120,
          });
        }
      }

      ctx.save();
      ctx.translate(jet.x+jet.width/2,jet.y+jet.height/2);
      ctx.rotate(jet.angle);
      ctx.globalAlpha=1;
      ctx.drawImage(jetImg,-jet.width/2,-jet.height/2,jet.width,jet.height);
      ctx.restore();

      if(!jet.lootSpawned){
        jet.lootSpawned=true;
        spawnCapsule(jet.x+jet.width/2, jet.y, jet);
      }

      const wx=jet.x, wy=jet.y, ww=jet.width, wh=jet.height;
      if(dino.x<wx+ww&&dino.x+dino.width>wx&&dino.y<wy+wh&&dino.y+dino.height>wy+5){
        for(let ci=capsules.length-1;ci>=0;ci--){
          const cap=capsules[ci];
          if(cap.parentJet===jet&&!cap.collected){
            cap.collected=true;
            applyPowerup(cap.type);
            for(let j=0;j<16;j++)impactParticles.push({
              x:jet.x+jet.width/2,y:jet.y+jet.height/2,
              dx:(Math.random()-0.5)*7,dy:(Math.random()-0.5)*7-2,
              size:Math.random()*5+2,life:38,color:cap.type.color
            });
            capsules.splice(ci,1);
            break;
          }
        }
        jet.lootCollected=true;
      }

      if(jet.landedFrames>400||(jet.lootCollected&&jet.landedFrames>60)){
        jets.splice(i,1);continue;
      }
      if(jet.x+jet.width<-20){jets.splice(i,1);continue;}
      jet.x-=gS('dinoSpeed');
    }

    for(let k=jet.smokeParticles.length-1;k>=0;k--){
      const p=jet.smokeParticles[k];
      p.x+=p.dx;p.y+=p.dy;p.life--;
      if(p.life<=0){jet.smokeParticles.splice(k,1);continue;}
      const lifeFrac=Math.max(0,Math.min(1,p.life/p.maxLife));
      const a=lifeFrac*0.45;
      const r=Math.max(0.1,p.size*(lifeFrac+0.3));
      ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#888';
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }

  for(let i=jetParticles.length-1;i>=0;i--){
    const p=jetParticles[i];p.x+=p.dx;p.y+=p.dy;p.life--;
    if(p.life<=0){jetParticles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=Math.max(0,p.life/25);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size),0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // ── FALLING CACTUSES (jet drops) ──
  // These use the HP system — NOT instant kill
  for(let i=fallingCactuses.length-1;i>=0;i--){
    const fc=fallingCactuses[i];
    if(fc.dead){fallingCactuses.splice(i,1);continue;}

    fc.age++;
    fc.dy+=0.35;
    fc.y+=fc.dy;
    fc.x-=gS('dinoSpeed');

    if(fc.age>700)fc.dead=true;

    const heightAbove=Math.max(0,gY-(fc.y+fc.height));
    const shadowAlpha=Math.max(0,0.22*(1-heightAbove/280));
    if(shadowAlpha>0){
      ctx.save();ctx.globalAlpha=shadowAlpha;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(fc.x+fc.width/2,gY+3,fc.width*0.45*(1-heightAbove/280),3.5,0,0,Math.PI*2);
      ctx.fill();ctx.restore();
    }

    ctx.save();
    ctx.translate(fc.x+fc.width/2,fc.y+fc.height/2);
    ctx.rotate(Math.sin(fc.age*0.12)*0.18);
    ctx.drawImage(cacImg,-fc.width/2,-fc.height/2,fc.width,fc.height);
    ctx.restore();

    // ── HP-BASED hit detection (jet falling cactuses only, while airborne) ──
    if(!fc.landed && getEffHitH()>0){
      if(dino.x < fc.x+fc.width && dino.x+dino.width > fc.x &&
         dino.y < fc.y+fc.height && dino.y+getEffHitH() > fc.y){
        if(forceFieldActive){
          for(let j=0;j<10;j++)impactParticles.push({x:dino.x+dino.width/2,y:dino.y+dino.height/2,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,size:3+Math.random()*3,life:25,color:'#ff0'});
          fc.dead=true;continue;
        }
        // Use HP system — not instant kill
        fc.dead=true; // consume the cactus regardless
        takeFallingCactusHit(); // reduces HP; kills if 0
        continue;
      }
    }

    if(fc.y+fc.height>=gY && fc.bounceCount===0){
      fc.y=gY-fc.height;
      fc.dy*=-0.40;
      fc.bounceCount=1;
      for(let j=0;j<10;j++){
        impactParticles.push({
          x:fc.x+fc.width/2,y:gY,
          dx:(Math.random()-0.5)*4,dy:-Math.random()*3-1,
          size:Math.random()*3+2,life:28,color:'#fa6'
        });
      }
      screenShakeF=Math.max(screenShakeF,6);screenShakeA=Math.max(screenShakeA,5);
    }

    if(fc.x<-140||fc.x>canvas.width+140)fc.dead=true;
  }
}

function updateImpact(){
  for(let i=impactParticles.length-1;i>=0;i--){
    const p=impactParticles[i];
    p.x+=p.dx;p.y+=p.dy;p.dy+=.12;p.life--;
    if(p.life<=0){impactParticles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=Math.max(0,p.life/35);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size),0,Math.PI*2);ctx.fill();ctx.restore();
  }
}

function drawDino(){
  // Red tint on dino while invincible after a jet hit
  ctx.save();ctx.translate(dino.x+dino.width/2,dino.y+dino.height/2);
  const stretch=Math.max(.65,Math.min(1.4,1-dino.dy*.03));
  ctx.scale(1/Math.sqrt(stretch),stretch);
  if(!dino.isJumping&&Math.abs(dino.dy)<1){
    if(Math.random()<.3)impactParticles.push({
      x:dino.x+dino.width/2+(Math.random()-.5)*dino.width*.4,y:dino.y+dino.height,
      dx:(Math.random()-.5)*1.5,dy:-Math.random()*.5,size:Math.random()*2+1,life:15,color:'rgba(200,200,200,.6)'
    });
  }
  // Brief red overlay while invincible
  if(hpInvincFrames > 0 && hpInvincFrames % 6 < 3){
    ctx.globalAlpha = 0.5;
    ctx.filter = 'sepia(1) saturate(10) hue-rotate(-10deg)';
  }
  ctx.drawImage(dinoImg,-dino.width/2,-dino.height/2,dino.width,dino.height);
  ctx.restore();
}

function drawGhost(fi){
  if(!document.getElementById('ghostEnabled').checked)return;
  if(!bestRunFrames.length)return;
  const idx=Math.min(fi,bestRunFrames.length-1);
  const gf=bestRunFrames[idx];if(!gf)return;
  const alpha=gS('ghostOpacity');
  ctx.save();ctx.globalAlpha=alpha;ctx.filter='hue-rotate(190deg) brightness(1.5) saturate(1.8)';
  ctx.drawImage(dinoImg,gf.dx,gf.dy,60,70);ctx.restore();
  if(document.getElementById('ghostPrediction').checked){
    const pts=[];
    for(let f=idx;f<Math.min(idx+120,bestRunFrames.length);f+=3)pts.push(bestRunFrames[f]);
    if(pts.length>1){
      for(let i=0;i<pts.length-1;i++){
        const a=pts[i],b=pts[i+1],prog=i/(pts.length-1);
        ctx.save();ctx.globalAlpha=alpha*(1-prog*.9);ctx.strokeStyle='rgba(80,180,255,1)';
        ctx.lineWidth=Math.max(.5,4*(1-prog));ctx.shadowColor='#4af';ctx.shadowBlur=6*alpha*(1-prog*.9);ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(a.dx+30,a.dy+35);ctx.lineTo(b.dx+30,b.dy+35);ctx.stroke();ctx.restore();
        if(a.ddy<0&&b.ddy>=0){ctx.save();ctx.globalAlpha=alpha*.9;ctx.fillStyle='#4af';ctx.shadowColor='#4af';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(a.dx+30,a.dy+35,4,0,Math.PI*2);ctx.fill();ctx.restore();}
      }
    }
  }
  if(document.getElementById('ghostTimer').checked&&bestRunFrames.length>0){
    const remain=bestRunFrames.length-idx;
    ctx.save();ctx.globalAlpha=Math.min(1,alpha*2.8);ctx.fillStyle=remain<180?'#f55':'#4af';
    ctx.font='bold 12px "Space Mono",monospace';ctx.fillText(`GHOST -${(remain/60).toFixed(1)}s`,gf.dx+66,gf.dy+14);ctx.restore();
  }
}

function drawGround(){
  const gY=ground()+60;
  const grd=ctx.createLinearGradient(0,gY,0,canvas.height);
  grd.addColorStop(0,'#222');grd.addColorStop(1,'#111');
  ctx.fillStyle=grd;ctx.fillRect(0,gY,canvas.width,canvas.height-gY);
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,gY);ctx.lineTo(canvas.width,gY);ctx.stroke();
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let x=(frameCount*gS('dinoSpeed'))%60;x<canvas.width;x+=60){ctx.beginPath();ctx.moveTo(x,gY);ctx.lineTo(x,canvas.height);ctx.stroke();}
  ctx.restore();
}

function drawHUD(){
  const x=canvas.width-200;
  ctx.save();ctx.font='13px "Space Mono",monospace';
  ctx.fillStyle='#ccc';ctx.fillText('SCORE:  '+Math.floor(score),x,28);
  ctx.fillStyle='#fa0';ctx.fillText('HIGH:   '+Math.floor(highScore),x,46);
  ctx.fillStyle='#8df';ctx.fillText('NORMAL: '+Math.floor(normalHighScore),x,64);
  ctx.fillStyle='#f8a';ctx.fillText('MODDED: '+Math.floor(moddedHighScore),x,82);
  if(bestRunFrames.length&&document.getElementById('ghostEnabled').checked){
    ctx.fillStyle='rgba(80,160,255,.6)';ctx.font='10px "Space Mono",monospace';
    ctx.fillText('GHOST ACTIVE',x,100);
  }
  ctx.restore();
  document.getElementById('topbar-score').textContent='SCORE: '+Math.floor(score);
  drawBuffBar();
  drawHPBar(); // draw jet HP bar (auto-hidden when full)
}

function applyShake(){
  if(screenShakeF>0){ctx.translate((Math.random()-.5)*screenShakeA,(Math.random()-.5)*screenShakeA);screenShakeF--;screenShakeA*=.88;}
}

function startSletted(){
  slettedPhase=1;slettedX=dino.x+dino.width/2;slettedY=dino.y+dino.height/2;
  slettedVX=2.5+Math.random()*2;slettedVY=-9;slettedAngle=0;slettedTrail=[];
  ttedSoundPlayed=false;
  try{sleSound.currentTime=0;sleSound.play();}catch(e){}
  bgTracks.forEach(t=>{try{t.pause();t.currentTime=0;}catch(e){}});musicPlaying=false;
  updateTabLockState();
}

let groundCrackX=0,groundCrackLife=0;
function updateSletted(){
  const gY=ground()+35;
  if(slettedPhase===1){
    slettedTrail.push({x:slettedX,y:slettedY,angle:slettedAngle});
    if(slettedTrail.length>40)slettedTrail.shift();
    slettedVY+=getEffGravity()*.4;slettedX+=slettedVX;slettedY+=slettedVY;slettedAngle+=.2;
    for(let i=0;i<slettedTrail.length;i++){
      const t=slettedTrail[i],p=i/slettedTrail.length,s=.25+.75*p;
      ctx.save();ctx.globalAlpha=p*.5;ctx.translate(t.x,t.y);ctx.rotate(t.angle);ctx.filter=`hue-rotate(${p*30}deg)`;
      ctx.drawImage(dinoImg,-30*s,-35*s,60*s,70*s);ctx.restore();
    }
    ctx.save();ctx.globalAlpha=.15;ctx.filter='blur(8px)';ctx.translate(slettedX,slettedY);ctx.rotate(slettedAngle);ctx.drawImage(dinoImg,-30,-35,60,70);ctx.restore();
    ctx.save();ctx.translate(slettedX,slettedY);ctx.rotate(slettedAngle);ctx.drawImage(dinoImg,-30,-35,60,70);ctx.restore();
    if(slettedY>=gY){
      slettedY=gY;slettedVY*=-.42;slettedVX*=.6;slettedPhase=2;screenShakeF=28;screenShakeA=18;
      for(let j=0;j<20;j++)impactParticles.push({x:slettedX,y:gY,dx:(Math.random()-.5)*8,dy:-Math.random()*5-1,size:Math.random()*5+3,life:40,color:`hsl(${Math.random()*30+5},100%,${55+Math.random()*20}%)`});
      groundCrackX=slettedX;groundCrackLife=35;
    }
  } else if(slettedPhase===2){
    slettedVY+=.3;slettedX+=slettedVX*.4;slettedY+=slettedVY;slettedAngle+=.07;
    slettedTrail.push({x:slettedX,y:slettedY,angle:slettedAngle});
    if(slettedTrail.length>20)slettedTrail.shift();
    for(let i=0;i<slettedTrail.length;i++){
      const p=i/slettedTrail.length;
      ctx.save();ctx.globalAlpha=p*.25;ctx.translate(slettedTrail[i].x,slettedTrail[i].y);ctx.rotate(slettedTrail[i].angle);ctx.drawImage(dinoImg,-25,-30,50,60);ctx.restore();
    }
    ctx.save();ctx.translate(slettedX,slettedY);ctx.rotate(slettedAngle);ctx.drawImage(dinoImg,-30,-35,60,70);ctx.restore();
    if(!ttedSoundPlayed){ttedSoundPlayed=true;try{ttedSound.currentTime=0;ttedSound.play();}catch(e){}}
    if(slettedY>gY+12)slettedPhase=3;
  } else if(slettedPhase===3){
    slettedVY+=.55;slettedY+=slettedVY;slettedAngle+=.06;
    const alpha=Math.max(0,1-(slettedY-gY-12)/140);
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(slettedX,slettedY);ctx.rotate(slettedAngle);ctx.drawImage(dinoImg,-30,-35,60,70);ctx.restore();
    if(alpha<=0||slettedY>canvas.height+120){showDeathScreen();slettedPhase=4;}
  }
}
function drawGroundCrack(){
  if(groundCrackLife<=0)return;
  const p=groundCrackLife/35,gY=ground()+60;
  ctx.save();ctx.globalAlpha=p*.8;ctx.strokeStyle=`rgba(255,100,50,${p})`;ctx.lineWidth=2;
  for(let i=0;i<6;i++){
    const angle=(i/6)*Math.PI*2+groundCrackX*.1,len=(40+Math.random()*20)*(1-p*.3);
    ctx.beginPath();ctx.moveTo(groundCrackX,gY);ctx.lineTo(groundCrackX+Math.cos(angle)*len,gY+Math.sin(angle)*len*.35);ctx.stroke();
  }
  ctx.restore();groundCrackLife--;
}

const deathBgCanvas=document.getElementById('deathBg');
const dbCtx=deathBgCanvas.getContext('2d');
let dbParticles=[],dbRAF=null;
function showDeathScreen(){
  document.getElementById('dsScore').textContent=Math.floor(score);
  const hs=Math.max(highScore,score);
  document.getElementById('dsHs').textContent='HIGH SCORE: '+Math.floor(hs);
  const isNew=score>=highScore&&score>0;
  document.getElementById('dsNew').style.display=isNew?'block':'none';
  document.getElementById('deathScreen').style.display='flex';
  deathBgCanvas.width=window.innerWidth;deathBgCanvas.height=window.innerHeight;
  dbParticles=[];
  for(let i=0;i<60;i++)dbParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*2+.5,life:1,decay:.002+Math.random()*.003,color:`hsl(${Math.random()*30},100%,${50+Math.random()*20}%)`});
  runDeathBg();updateTabLockState();
}
function runDeathBg(){
  slettedTheme.play();
  dbCtx.fillStyle='rgba(0,0,0,.08)';dbCtx.fillRect(0,0,deathBgCanvas.width,deathBgCanvas.height);
  for(let i=dbParticles.length-1;i>=0;i--){
    const p=dbParticles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0){
      dbParticles.splice(i,1);
      dbParticles.push({x:Math.random()*deathBgCanvas.width,y:deathBgCanvas.height*(.4+Math.random()*.6),vx:(Math.random()-.5)*.8,vy:-Math.random()*1.5-.3,r:Math.random()*2+.5,life:1,decay:.002+Math.random()*.003,color:`hsl(${Math.random()*30},100%,${50+Math.random()*20}%)`});
    } else {
      dbCtx.save();dbCtx.globalAlpha=p.life*.7;dbCtx.fillStyle=p.color;dbCtx.shadowColor=p.color;dbCtx.shadowBlur=8;
      dbCtx.beginPath();dbCtx.arc(p.x,p.y,p.r,0,Math.PI*2);dbCtx.fill();dbCtx.restore();
    }
  }
  dbRAF=requestAnimationFrame(runDeathBg);
}
function hideDeathScreen(){document.getElementById('deathScreen').style.display='none';cancelAnimationFrame(dbRAF);slettedTheme.pause();slettedTheme.currentTime=0;}

function handleGameOver(){
  if(gameOver)return;
  gameOver=true;clearTimeout(cactusTimer);
  clearTimeout(warnFlashTimer);document.getElementById('warningFlash').classList.remove('show');
  if(score>highScore){highScore=Math.floor(score);LS('highScore',highScore);}
  if(isDefault()&&score>normalHighScore){normalHighScore=Math.floor(score);LS('normalHighScore',normalHighScore);}
  else if(!isDefault()&&score>moddedHighScore){moddedHighScore=Math.floor(score);LS('moddedHighScore',moddedHighScore);}
  saveBestRun();startSletted();
}

function update(){
  requestAnimationFrame(update);
  try{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(slettedPhase===4)return;
  if(paused){
    ctx.save();drawGround();
    cactuses.forEach(c=>ctx.drawImage(cacImg,c.x,c.y,c.width,c.height));
    drawDino();drawHUD();ctx.restore();return;
  }
  ctx.save();applyShake();
  drawGround();drawGroundCrack();
  if(!gameOver){
    dino.y+=dino.dy;
    if(dino.y+dino.height<canvas.height)dino.dy+=getEffGravity();
    if(dino.y>=ground()){dino.y=ground();dino.dy=0;dino.isJumping=false;}
    drawGhost(frameCount);
    for(let i=0;i<cactuses.length;i++){
      const c=cactuses[i];c.x-=gS('dinoSpeed');
      ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#000';ctx.fillRect(c.x+4,ground()+62,c.width,6);ctx.restore();
      ctx.drawImage(cacImg,c.x,c.y,c.width,c.height);
      const hh=getEffHitH();
      // Ground cactuses: INSTANT KILL (unchanged)
      if(hh>0&&dino.x<c.x+c.width&&dino.x+dino.width>c.x&&dino.y<c.y+c.height&&dino.y+hh>c.y){
        if(forceFieldActive){
          for(let j=0;j<12;j++)impactParticles.push({x:dino.x+dino.width/2,y:dino.y+dino.height/2,dx:(Math.random()-.5)*6,dy:(Math.random()-.5)*6,size:3+Math.random()*3,life:28,color:'#ff0'});
          cactuses.splice(i,1);i--;continue;
        }
        handleGameOver();break;
      }
      if(c.x+c.width<0){cactuses.splice(i,1);i--;try{passSound.currentTime=0;passSound.play();}catch(e){}score++;}
    }
    drawDino();drawForcefield();
    if(!jetsUnlocked&&score>45){
      jetsUnlocked=true;
      if(!jetSpawnScheduled){
        jetSpawnScheduled=true;
        spawnJet();
      }
    }
    if(jetsUnlocked)updateJets();
    updateCapsules();tickPowerups();
    tickHP(); // tick the jet life system every frame
    updateImpact();drawHUD();
    captureFrame();frameCount++;
    if(score>=300)triggerSecretEnding();
  } else if(slettedPhase>0&&slettedPhase<4){
    cactuses.forEach(c=>ctx.drawImage(cacImg,c.x,c.y,c.width,c.height));
    updateSletted();updateImpact();drawHUD();
  }
  ctx.restore();
  }catch(e){console.error('update loop error:',e);}
}

setInterval(()=>{
  if(!paused&&!gameOver){
    score+=gS('scoreRate')*.5;
    const fl=Math.floor(score);
    if(fl%10===0&&fl!==lastMilestone){try{milestoneSound.currentTime=0;milestoneSound.play();}catch(e){}lastMilestone=fl;}
  }
},500);

function jump(){
  if(slettedPhase>0)return;
  if(!dino.isJumping){dino.dy=-gS('jumpPower');dino.isJumping=true;}
  if(!musicPlaying)playTrack();
}
function setPauseUI(on){
  canvas.classList.toggle('paused',on);
  document.getElementById('pauseCard').classList.toggle('visible',on);
  document.getElementById('mobilePause').textContent=on?'▶':'⏸';
}
function togglePause(){
  if(gameOver)return;
  pauseTheme.play();
  bgTracks.forEach(t=>{try{t.pause();}catch(e){}});musicPlaying=false;
  paused=!paused;setPauseUI(paused);updateTabLockState();
  if(!paused){
    TABS.forEach(t=>{document.getElementById(t.panel).classList.remove('open');document.getElementById(t.btn).classList.remove('active');});
    setTimeout(resizeCanvas,10);
    cactusTimer=setTimeout(spawnCactus,Math.max(400,gS('spawnFreq')*spawnMult()));
  } else {clearTimeout(cactusTimer);}
}
function resumeGame(){
  pauseTheme.pause();pauseTheme.currentTime=0;
  if(activeTrack){try{activeTrack.play();}catch(e){} musicPlaying=true;}
  if(!paused)return;paused=false;setPauseUI(false);
  TABS.forEach(t=>{document.getElementById(t.panel).classList.remove('open');document.getElementById(t.btn).classList.remove('active');});
  updateTabLockState();setTimeout(resizeCanvas,10);
  if(!gameOver)cactusTimer=setTimeout(spawnCactus,Math.max(400,gS('spawnFreq')*spawnMult()));
}
function doRestart(){hideDeathScreen();restartGame();}
function restartGame(){
  pauseTheme.pause();pauseTheme.currentTime=0;
  clearTimeout(cactusTimer);setPauseUI(false);
  TABS.forEach(t=>{document.getElementById(t.panel).classList.remove('open');document.getElementById(t.btn).classList.remove('active');});
  initState();resizeCanvas();spawnCactus();
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(paused){resumeGame();return;}jump();}
  if(e.code==='KeyP'||e.code==='Escape'){e.preventDefault();togglePause();}
  if(e.code==='KeyR'&&paused){e.preventDefault();restartGame();}
});

canvas.addEventListener('contextmenu',e=>e.preventDefault());

function playTrack(){
  musicPlaying=true;
  const pick=Math.random()<.5?bg1:bg2;
  bgTracks.forEach(t=>{try{t.pause();t.currentTime=0;}catch(e){}});
  activeTrack=pick;

const pbCanvas=document.getElementById('playbackCanvas');
const pbCtx=pbCanvas.getContext('2d');
let pbFrames=[],pbIdx=0,pbPlaying=true,pbSpeed=1,pbRAF2=null,pbLast=0;
function openPlayback(){
  if(!recording.length){alert('No recording yet.');return;}
  hideDeathScreen();document.getElementById('playbackOverlay').style.display='flex';
  pbFrames=recording.slice();pbIdx=0;pbPlaying=true;

  pbCanvas.width=maxW;pbCanvas.height=maxW*ratio;

  document.getElementById('pbTimeline').onclick=e=>{const r=document.getElementById('pbTimeline').getBoundingClientRect();pbIdx=((e.clientX-r.left)/r.width)*pbFrames.length;};
  cancelAnimationFrame(pbRAF2);pbLast=performance.now();pbRAF2=requestAnimationFrame(runPB);

document.getElementById('pbPlayPause').addEventListener('click',()=>{
  pbPlaying=!pbPlaying;document.getElementById('pbPlayPause').textContent=pbPlaying?'Pause':'Play';

});
document.getElementById('pbRestart').addEventListener('click',()=>{pbIdx=0;});

function runPB(ts){
  if(!pbPlaying)return;
  const el=ts-pbLast;pbLast=ts;pbIdx+=el/(1000/60)*pbSpeed;
  if(pbIdx>=pbFrames.length){pbIdx=pbFrames.length-1;pbPlaying=false;document.getElementById('pbPlayPause').textContent='Play';}
  renderPBFrame(Math.floor(pbIdx));
  const pct=pbIdx/Math.max(1,pbFrames.length-1);
  document.getElementById('pbFill').style.width=(pct*100)+'%';
  const fi=Math.floor(pbIdx),t=pbFrames[fi]?(pbFrames[fi].t-pbFrames[0].t):0;
  const ms=Math.floor(t%1000),s=Math.floor(t/1000)%60,m=Math.floor(t/60000);
  document.getElementById('pbTimestamp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms).padStart(3,'0');
  pbRAF2=requestAnimationFrame(runPB);
}
function renderPBFrame(fi){
  if(fi<0||fi>=pbFrames.length)return;
  const f=pbFrames[fi],sx=pbCanvas.width/canvas.width,sy=pbCanvas.height/canvas.height;
  pbCtx.clearRect(0,0,pbCanvas.width,pbCanvas.height);pbCtx.save();pbCtx.scale(sx,sy);
  pbCtx.fillStyle='#0a0a0a';pbCtx.fillRect(0,0,canvas.width,canvas.height);
  const gY=canvas.height-80+60;
  const grd=pbCtx.createLinearGradient(0,gY,0,canvas.height);
  grd.addColorStop(0,'#222');grd.addColorStop(1,'#111');
  pbCtx.fillStyle=grd;pbCtx.fillRect(0,gY,canvas.width,canvas.height-gY);
  pbCtx.strokeStyle='#444';pbCtx.lineWidth=1.5;pbCtx.beginPath();pbCtx.moveTo(0,gY);pbCtx.lineTo(canvas.width,gY);pbCtx.stroke();
  f.cactuses.forEach(c=>pbCtx.drawImage(cacImg,c.x,c.y,c.width,c.height));
  (f.fallingCactuses||[]).forEach(c=>pbCtx.drawImage(cacImg,c.x,c.y,c.width,c.height));
  pbCtx.drawImage(dinoImg,f.dx,f.dy,60,70);
  pbCtx.fillStyle='#ccc';pbCtx.font='13px monospace';pbCtx.fillText('SCORE: '+Math.floor(f.score),canvas.width-170,26);
  if(fi===pbFrames.length-1){
    const g2=pbCtx.createLinearGradient(f.dx-20,0,f.dx+100,0);
    g2.addColorStop(0,'rgba(255,30,30,0)');g2.addColorStop(.5,'rgba(255,30,30,.2)');g2.addColorStop(1,'rgba(255,30,30,0)');
    pbCtx.fillStyle=g2;pbCtx.fillRect(f.dx-20,0,120,canvas.height);
    pbCtx.fillStyle='#f44';pbCtx.font='bold 20px "Bebas Neue",cursive';pbCtx.fillText('SLETTED',f.dx-15,55);
  }
  pbCtx.restore();
}
